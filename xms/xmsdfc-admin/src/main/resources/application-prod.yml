#canal中间件配置, binlog只允许row，不允许其他，否则无法解析
canal:
  #实例，要跟服务端的一一对应
  destination: xmsdfc
  #服务地址
  server: 127.0.0.1:11111
  # 模式  内嵌：simpleDiy  关闭：simpleDiyOff 其他的自己代码层看
  mode: simpleDiy
  # 订阅监听的库表。一定要设置
  # table regex 	mysql 数据解析关注的表，Perl正则表达式.多个正则之间以逗号(,)分隔，转义符需要双斜杠(\)
  #常见例子：1. 所有表：.* or .\… 2. canal schema下所有表： canal\…* 3. canal下的以canal打头的表：canal\.canal.*
  #4. canal schema下的一张表：canal.test1 5. 多个规则组合使用：canal\…*,mysql.test1,mysql.test2 (逗号分隔)
  # .*\\..* 所有的
  filter: xmsdfc.t_user_money
  #是否异步处理
  async: false

