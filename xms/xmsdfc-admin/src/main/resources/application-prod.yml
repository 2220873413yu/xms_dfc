# 日志配置
logging:
    config: classpath:log4j2-spring.xml
    level:
        com.xms: info
        org.springframework: warn
# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 18866
  servlet:
    # 应用的访问路径
    context-path: /
  undertow:
    threads:
      # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程
      io: 16
      # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载
      worker: 999
      # 以下的配置会影响buffer,这些buffer会用于服务器连接的IO操作,有点类似netty的池化内存管理
    buffer-size: 1024
    # 是否分配的直接内存
    direct-buffers: true

# 数据源配置
spring:
    # 服务模块
    devtools:
        restart:
            # 热部署开关
            enabled: false
    # redis 配置 boot3微调
    data:
      redis:
          # 地址
          host: localhost
          # 端口，默认为6379
          port: 6379
          # 密码
          password: VVuz892aa
          # 连接超时时间
          timeout: 10000
          database: 0
          lettuce:
              pool:
                  # 连接池中的最小空闲连接
                  min-idle: 0
                  # 连接池中的最大空闲连接
                  max-idle: 8
                  # 连接池的最大数据库连接数
                  max-active: 8
                  # #连接池最大阻塞等待时间（使用负值表示没有限制）
                  max-wait: -1
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # 主库数据源
            master:
                url: jdbc:mysql://localhost:3306/xmsdfc?useUnicode=true&allowMultiQueries=true&rewriteBatchedStatements=true&useAffectedRows=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&autoReconnect=true&autoReconnectForPools=true&connectTimeout=30000&socketTimeout=60000&useSSL=false&serverTimezone=GMT%2B8
                username: root
                password: LBA4uxF2
            # 从库数据源
            slave:
                # 从数据源开关/默认关闭
                enabled: false
                url:
                username:
                password:
            # 初始连接数
            initialSize: 5
            # 最小连接池数量
            minIdle: 10
            # 最大连接池数量
            maxActive: 20
            # 配置获取连接等待超时的时间
            maxWait: 60000
            # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
            timeBetweenEvictionRunsMillis: 50000
            # 配置一个连接在池中最小生存的时间，单位是毫秒
            minEvictableIdleTimeMillis: 300000
            # 配置一个连接在池中最大生存的时间，单位是毫秒
            maxEvictableIdleTimeMillis: 900000
            # 配置检测连接是否有效
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter:
                enabled: true
            statViewServlet:
                enabled: true
                # 设置白名单，不填则允许所有访问
                allow:
                url-pattern: /druid/*
                login-username: admin
                login-password: aleo-@42ed43X09d3898784a.
            filter:
                stat:
                    enabled: true
                    # 慢SQL记录
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true

