# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true

# CoinGlass API配置
coinglass:
  api:
    # CoinGlass API密钥
    secret: 158d1b4326164c9081d8bfa1b24d4988
    # API基础URL
    base-url: https://open-api-v4.coinglass.com

# 火山引擎豆包对话配置
volcano:
  chat:
    # API密钥（请在火山引擎控制台获取）
    api-key: 填写你的API_KEY
    # 密钥（用于签名，可选）
    secret-key: 填写你的SECRET_KEY
    # 端点ID（模型ID）
    endpoint-id: 填写你的ENDPOINT_ID
    # API基础URL
    base-url: https://ark.cn-beijing.volces.com
server:
  # 服务器的HTTP端口，默认为8080
  port: 18865
  undertow:
    threads:
      # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程
      io: 16
      # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载
      worker: 999
      # 以下的配置会影响buffer,这些buffer会用于服务器连接的IO操作,有点类似netty的池化内存管理
    buffer-size: 1024
    # 是否分配的直接内存
    direct-buffers: true
# 日志配置
logging:
  config: classpath:log4j2-spring.xml
  level:
    com.xms: debug
    org.springframework: warn
# 项目相关配置
xms:
  # 名称
  name: xms
  # 版本
  version: 3.8.5
  # 版权年份
  copyrightYear: 2024
  # 实例演示开关
  demoEnabled: false
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: ./uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数组计算 char 字符验证
  captchaType: math

OSS: # 默认为七牛云OSS存储
  # 公钥
  accessKey: D8n5VUrnrHHAFtmby6QAvxT6D34utrTNrPK4Na2n
  # 私钥
  secretKey: kBvlxYohjMh-HUY2YeCQxNDAfqz199vVWJ0jgFKS
  # 存储空间名
  bucketName: starpics
  # 域名/路径
  path: https://starpics.dtxykj.com
  #是否开启
